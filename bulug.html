<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажер Повторения (Книга и Хадисы)</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #81a1c1;
            --text-color: #eceff4;
            --text-muted: #d8dee9;
            --border-color: #4c566a;
            --review-fresh: #a3be8c;
            --review-old: #ebcb8b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        h2 {
            text-align: center;
            color: var(--accent-color);
            margin-top: 0;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .status-box {
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            background-color: rgba(255,255,255,0.02);
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .review-section {
            border-top: 1px solid var(--border-color);
            margin-top: 10px;
            padding-top: 10px;
        }

        .highlight {
            font-weight: bold;
            color: var(--accent-color);
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .inputs-row {
            display: flex;
            gap: 10px;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            font-size: 16px;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            border: none;
            border-radius: 6px;
            color: var(--bg-color);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--review-fresh);
        }

        .history-title {
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
        }

        .history-list {
            max-height: 120px;
            overflow-y: auto;
            font-size: 14px;
            color: var(--text-muted);
            padding-left: 20px;
            margin-top: 10px;
        }

        #loading-overlay {
            display: none;
            text-align: center;
            color: #ebcb8b;
            font-size: 14px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>بلوغ المرام - لوحة التحكم</h2>
    <div class="subtitle">Панель контроля страниц и хадисов</div>
    
    <div id="loading-overlay">Синхронизация с облаком Google...</div>

    <div class="status-box">
        <div class="status-item">
            <span>التقدم الحالي (Текущий прогресс):</span>
            <span class="highlight">стр. <span id="last-read-ui">0</span> | хадис <span id="last-hadith-ui">0</span></span>
        </div>
        
        <div class="status-item review-section">
            <span> Griffin 📌 التكرار القريب (Свежее):</span>
            <span id="fresh-review-ui" class="highlight" style="color: var(--review-fresh);">Загрузка...</span>
        </div>

        <div class="status-item" style="margin-top: 5px;">
            <span>🔄 التكرار القديم (Старое по кругу):</span>
            <span id="old-review-ui" class="highlight" style="color: var(--review-old);">Загрузка...</span>
        </div>
    </div>

    <div class="inputs-row" style="margin-bottom: 10px;">
        <div class="input-group" style="width: 50%;">
            <label>Лимит страниц:</label>
            <input type="number" id="fresh-limit" value="5" min="1" onchange="updateUI()">
        </div>
        <div class="input-group" style="width: 50%;">
            <label>Шаг хадисов по кругу:</label>
            <input type="number" id="old-limit" value="3" min="1" onchange="updateUI()">
        </div>
    </div>

    <div class="input-group">
        <label>Добавить новые страницы за сегодня:</label>
        <div class="inputs-row">
            <input type="number" id="page-start" placeholder="С какой стр.">
            <input type="number" id="page-end" placeholder="По какую стр.">
        </div>
    </div>

    <div class="input-group">
        <label>Добавить номера пройденных хадисов:</label>
        <div class="inputs-row">
            <input type="number" id="hadith-start" placeholder="С какого хадиса">
            <input type="number" id="hadith-end" placeholder="По какой хадис">
        </div>
    </div>

    <button id="submit-btn" onclick="saveProgress()">Отправить в Google Таблицу</button>

    <div class="history-title">История уроков:</div>
    <ul id="history-ui" class="history-list"></ul>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxrrTqo-8kfztMatUhj2hbWtJsZGF-dvM_LNtbkOvrMGnU1HuvkAQDIHvwVOUvLnmGr2A/exec";

    let readingData = {
        lastPage: 0,
        lastHadith: 0,
        history: []
    };

    async function loadDataFromSheets() {
        document.getElementById('loading-overlay').style.display = 'block';
        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'cors',
                body: JSON.stringify({ action: 'read' })
            });
            const rawData = await response.json();
            
            // Обработка данных из таблицы с учетом новых колонок хадисов
            readingData.history = rawData.history.map(item => ({
                start: item.start,
                end: item.end,
                date: item.date,
                hStart: item.hStart || 0,
                hEnd: item.hEnd || 0
            }));
            
            // Находим максимумы
            readingData.lastPage = rawData.lastPage || 0;
            readingData.lastHadith = 0;
            readingData.history.forEach(h => {
                if (parseInt(h.hEnd) > readingData.lastHadith) {
                    readingData.lastHadith = parseInt(h.hEnd);
                }
            });

            updateUI();
        } catch (error) {
            console.error("Ошибка синхронизации:", error);
            alert("Не удалось загрузить данные из Google Таблицы.");
        } finally {
            document.getElementById('loading-overlay').style.display = 'none';
        }
    }

    function updateUI() {
        const freshLimit = parseInt(document.getElementById('fresh-limit').value) || 5;
        const oldLimit = parseInt(document.getElementById('old-limit').value) || 3;
        
        document.getElementById('last-read-ui').innerText = readingData.lastPage;
        document.getElementById('last-hadith-ui').innerText = readingData.lastHadith;

        if (readingData.lastPage === 0) {
            document.getElementById('fresh-review-ui').innerText = "Начните чтение";
            document.getElementById('old-review-ui').innerText = "Нет данных";
            return;
        }

        // 1. РАСЧЕТ БЛИЖНЕГО ПОВТОРЕНИЯ СВЕЖЕГО (По страницам)
        let startFresh = readingData.lastPage - freshLimit + 1;
        if (startFresh < 1) startFresh = 1;
        document.getElementById('fresh-review-ui').innerText = `الصحائف من ${startFresh} إلى ${readingData.lastPage}`;

        // 2. РАСЧЕТ ДАЛЬНЕГО ПОВТОРЕНИЯ СТАРЫХ ХАДИСОВ (По кругу)
        if (readingData.lastHadith === 0) {
            document.getElementById('old-review-ui').innerText = "Хадисы не введены";
        } else {
            const totalLessons = readingData.history.length;
            let startOldH = ((totalLessons - 1) * oldLimit) % readingData.lastHadith + 1;
            let endOldH = startOldH + oldLimit - 1;
            if (endOldH > readingData.lastHadith) endOldH = readingData.lastHadith;

            document.getElementById('old-review-ui').innerText = `الأحاديث من ${startOldH} إلى ${endOldH}`;
        }

        // 3. ОБНОВЛЕНИЕ ЖУРНАЛА ИСТОРИИ
        const historyUi = document.getElementById('history-ui');
        historyUi.innerHTML = '';
        readingData.history.slice().reverse().forEach(item => {
            const li = document.createElement('li');
            let hadithText = item.hEnd > 0 ? ` | хадисы: ${item.hStart}-${item.hEnd}` : '';
            li.innerText = `Стр: ${item.start}-${item.end}${hadithText} (${item.date})`;
            historyUi.appendChild(li);
        });

        // Автоподстановка для удобства ввода
        document.getElementById('page-start').value = readingData.lastPage + 1;
        document.getElementById('page-end').value = '';
        document.getElementById('hadith-start').value = readingData.lastHadith + 1;
        document.getElementById('hadith-end').value = '';
    }

    async function saveProgress() {
        const start = parseInt(document.getElementById('page-start').value);
        const end = parseInt(document.getElementById('page-end').value);
        const hStart = parseInt(document.getElementById('hadith-start').value) || 0;
        const hEnd = parseInt(document.getElementById('hadith-end').value) || 0;

        if (isNaN(start) || isNaN(end) || start > end) {
            alert("Пожалуйста, введите корректный диапазон страниц.");
            return;
        }

        document.getElementById('loading-overlay').style.display = 'block';
        document.getElementById('submit-btn').disabled = true;

        const today = new Date().toLocaleDateString();
        
        // ВАЖНО: Скрипт Apps Script автоматически принимает дополнительные параметры, 
        // так как они передаются внутри JSON объекта
        const payload = {
            action: 'write',
            start: start,
            end: end,
            date: today,
            hStart: hStart,
            hEnd: hEnd
        };

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'cors',
                body: JSON.stringify(payload)
            });
            await loadDataFromSheets();
        } catch (error) {
            console.error("Ошибка отправки данных:", error);
            alert("Ошибка сохранения в облако.");
        } finally {
            document.getElementById('loading-overlay').style.display = 'none';
            document.getElementById('submit-btn').disabled = false;
        }
    }

    loadDataFromSheets();
</script>

</body>
</html>
