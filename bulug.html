<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажер Повторения (Интервальный)</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #81a1c1;
            --text-color: #eceff4;
            --text-muted: #d8dee9;
            --border-color: #4c566a;
            --review-fresh: #a3be8c;
            --review-old: #ebcb8b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        h2 {
            text-align: center;
            color: var(--accent-color);
            margin-top: 0;
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .status-box {
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            background-color: rgba(255,255,255,0.02);
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .review-section {
            border-top: 1px solid var(--border-color);
            margin-top: 10px;
            padding-top: 10px;
        }

        .highlight {
            font-weight: bold;
            color: var(--accent-color);
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .inputs-row {
            display: flex;
            gap: 10px;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            font-size: 16px;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            border: none;
            border-radius: 6px;
            color: var(--bg-color);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: var(--review-fresh);
        }

        .history-title {
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
        }

        .history-list {
            max-height: 120px;
            overflow-y: auto;
            font-size: 14px;
            color: var(--text-muted);
            padding-left: 20px;
            margin-top: 10px;
        }

        #loading-overlay {
            display: none;
            text-align: center;
            color: #ebcb8b;
            font-size: 14px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>لوحة التحكم في التكرار</h2>
    <div class="subtitle">Панель Чтения и Цикличного Повторения</div>
    
    <div id="loading-overlay">Синхронизация с облаком Google...</div>

    <div class="status-box">
        <div class="status-item">
            <span>الصفحة الأخيرة (Последняя страница):</span>
            <span id="last-read-ui" class="highlight">0</span>
        </div>
        
        <div class="status-item review-section">
            <span>📌 التكرار القريب (Свежий материал):</span>
            <span id="fresh-review-ui" class="highlight" style="color: var(--review-fresh);">Загрузка...</span>
        </div>

        <div class="status-item" style="margin-top: 5px;">
            <span>🔄 التكرار القديم (Старый по кругу):</span>
            <span id="old-review-ui" class="highlight" style="color: var(--review-old);">Загрузка...</span>
        </div>
    </div>

    <div class="inputs-row">
        <div class="input-group" style="width: 50%;">
            <label>Лимит свежего:</label>
            <input type="number" id="fresh-limit" value="5" min="1" onchange="updateUI()">
        </div>
        <div class="input-group" style="width: 50%;">
            <label>Размер шага старого:</label>
            <input type="number" id="old-limit" value="3" min="1" onchange="updateUI()">
        </div>
    </div>

    <div class="input-group">
        <label>Внести новые прочитанные страницы за сегодня:</label>
        <div class="inputs-row">
            <input type="number" id="page-start" placeholder="С какой">
            <input type="number" id="page-end" placeholder="По какую">
        </div>
    </div>

    <button id="submit-btn" onclick="saveProgress()">Отправить в Google Таблицу</button>

    <div class="history-title">История уроков из Google Таблицы:</div>
    <ul id="history-ui" class="history-list"></ul>
</div>

<script>
    // ОБЯЗАТЕЛЬНО УКАЖИТЕ ЗДЕСЬ ВАШ URL ИЗ GOOGLE APPS SCRIPT
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxLbF47y73gY6E2iwbIe370VgsRsvhrLjr6Ow-NeDDKQNOppCjPqGxbETrg445PHIEk/exec";

    let readingData = {
        lastPage: 0,
        history: []
    };

    async function loadDataFromSheets() {
        document.getElementById('loading-overlay').style.display = 'block';
        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'cors',
                body: JSON.stringify({ action: 'read' })
            });
            readingData = await response.json();
            updateUI();
        } catch (error) {
            console.error("Ошибка синхронизации:", error);
            alert("Не удалось загрузить данные из Google Таблицы.");
        } finally {
            document.getElementById('loading-overlay').style.display = 'none';
        }
    }

    function updateUI() {
        const freshLimit = parseInt(document.getElementById('fresh-limit').value) || 5;
        const oldLimit = parseInt(document.getElementById('old-limit').value) || 3;
        
        document.getElementById('last-read-ui').innerText = readingData.lastPage;

        if (readingData.lastPage === 0) {
            document.getElementById('fresh-review-ui').innerText = "Начните чтение";
            document.getElementById('old-review-ui').innerText = "Нет данных";
            return;
        }

        // 1. РАСЧЕТ БЛИЖНЕГО ПОВТОРЕНИЯ (Скользящее окно назад от максимума)
        let startFresh = readingData.lastPage - freshLimit + 1;
        if (startFresh < 1) startFresh = 1;
        
        if (startFresh === readingData.lastPage) {
            document.getElementById('fresh-review-ui').innerText = `الصفحة ${readingData.lastPage}`;
        } else {
            document.getElementById('fresh-review-ui').innerText = `من ${startFresh} إلى ${readingData.lastPage}`;
        }

        // 2. РАСЧЕТ ЦИКЛИЧНОГО ПОВТОРЕНИЯ СТАРЫХ СТРАНИЦ
        // Вычисляем текущий шаг по числу проведенных уроков (записей в истории)
        const totalLessons = readingData.history.length;
        
        // Математический алгоритм кругового сдвига
        let startOld = ((totalLessons - 1) * oldLimit) % readingData.lastPage + 1;
        let endOld = startOld + oldLimit - 1;
        
        if (endOld > readingData.lastPage) {
            endOld = readingData.lastPage;
        }

        if (startOld === endOld) {
            document.getElementById('old-review-ui').innerText = `الصفحة ${startOld}`;
        } else {
            document.getElementById('old-review-ui').innerText = `من ${startOld} إلى ${endOld}`;
        }

        // 3. ОБНОВЛЕНИЕ ТАБЛИЦЫ ИСТОРИИ НА ЭКРАНЕ
        const historyUi = document.getElementById('history-ui');
        historyUi.innerHTML = '';
        readingData.history.slice().reverse().forEach(item => {
            const li = document.createElement('li');
            li.innerText = `Страницы: ${item.start} — ${item.end} (${item.date})`;
            historyUi.appendChild(li);
        });

        document.getElementById('page-start').value = readingData.lastPage + 1;
        document.getElementById('page-end').value = '';
    }

    async function saveProgress() {
        const start = parseInt(document.getElementById('page-start').value);
        const end = parseInt(document.getElementById('page-end').value);

        if (isNaN(start) || isNaN(end) || start > end) {
            alert("Пожалуйста, введите корректный диапазон страниц.");
            return;
        }

        document.getElementById('loading-overlay').style.display = 'block';
        document.getElementById('submit-btn').disabled = true;

        const today = new Date().toLocaleDateString();
        const payload = {
            action: 'write',
            start: start,
            end: end,
            date: today
        };

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'cors',
                body: JSON.stringify(payload)
            });
            await loadDataFromSheets();
        } catch (error) {
            console.error("Ошибка отправки данных:", error);
            alert("Ошибка сохранения в облако.");
        } finally {
            document.getElementById('loading-overlay').style.display = 'none';
            document.getElementById('submit-btn').disabled = false;
        }
    }

    loadDataFromSheets();
</script>

</body>
</html>
