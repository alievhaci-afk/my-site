<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажер Повторения (Google Sheets)</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #81a1c1;
            --text-color: #eceff4;
            --text-muted: #d8dee9;
            --border-color: #4c566a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        h2 {
            text-align: center;
            color: var(--accent-color);
            margin-top: 0;
        }

        .status-box {
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            background-color: rgba(255,255,255,0.02);
            position: relative;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .status-item:last-child {
            margin-bottom: 0;
        }

        .highlight {
            font-weight: bold;
            color: var(--accent-color);
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .inputs-row {
            display: flex;
            gap: 10px;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            font-size: 16px;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            border: none;
            border-radius: 6px;
            color: var(--bg-color);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #a3be8c;
        }

        .history-title {
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
        }

        .history-list {
            max-height: 150px;
            overflow-y: auto;
            font-size: 14px;
            color: var(--text-muted);
            padding-left: 20px;
            margin-top: 10px;
        }

        #loading-overlay {
            display: none;
            text-align: center;
            color: #ebcb8b;
            font-size: 14px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Панель Чтения (Google Таблицы)</h2>
    
    <div id="loading-overlay">Синхронизация с облаком Google...</div>

    <div class="status-box">
        <div class="status-item">
            <span>Последняя прочитанная страница:</span>
            <span id="last-read-ui" class="highlight">0</span>
        </div>
        <div class="status-item" style="border-top: 1px solid var(--border-color); margin-top: 10px; padding-top: 10px;">
            <span>📋 План повторения на сегодня:</span>
            <span id="review-plan-ui" class="highlight" style="color: #a3be8c;">Загрузка...</span>
        </div>
    </div>

    <div class="input-group">
        <label>Лимит страниц для повтора:</label>
        <input type="number" id="review-limit" value="5" min="1" onchange="updateUI()">
    </div>

    <div class="input-group">
        <label>Внести новые прочитанные страницы:</label>
        <div class="inputs-row">
            <input type="number" id="page-start" placeholder="С какой">
            <input type="number" id="page-end" placeholder="По какую">
        </div>
    </div>

    <button id="submit-btn" onclick="saveProgress()">Отправить в Google Таблицу</button>

    <div class="history-title">История из Google Таблицы:</div>
    <ul id="history-ui" class="history-list"></ul>
</div>

<script>
    // СЮДА СКОПИРУЙТЕ ВАШ URL ВЕБ-ПРИЛОЖЕНИЯ ИЗ ШАГА 2
    const SCRIPT_URL = "ВСТАВЬТЕ_СЮДА_ВАШУ_ССЫЛКУ_ИЗ_ШАГА_2";

    let readingData = {
        lastPage: 0,
        history: []
    };

    async function loadDataFromSheets() {
        document.getElementById('loading-overlay').style.display = 'block';
        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'cors',
                body: JSON.stringify({ action: 'read' })
            });
            readingData = await response.getJson ? await response.json() : JSON.parse(await response.text());
            updateUI();
        } catch (error) {
            console.error("Ошибка загрузки данных:", error);
            alert("Не удалось связаться с Google Таблицей.");
        } finally {
            document.getElementById('loading-overlay').style.display = 'none';
        }
    }

    function updateUI() {
        const limit = parseInt(document.getElementById('review-limit').value) || 5;
        document.getElementById('last-read-ui').innerText = readingData.lastPage;

        if (readingData.lastPage === 0) {
            document.getElementById('review-plan-ui').innerText = "Начните чтение";
        } else {
            let startReview = readingData.lastPage - limit + 1;
            if (startReview < 1) startReview = 1;
            
            if (startReview === readingData.lastPage) {
                document.getElementById('review-plan-ui').innerText = `Страница ${readingData.lastPage}`;
            } else {
                document.getElementById('review-plan-ui').innerText = `С ${startReview} по ${readingData.lastPage}`;
            }
        }

        const historyUi = document.getElementById('history-ui');
        historyUi.innerHTML = '';
        readingData.history.slice().reverse().forEach(item => {
            const li = document.createElement('li');
            li.innerText = `Страницы: ${item.start} — ${item.end} (${item.date})`;
            historyUi.appendChild(li);
        });

        document.getElementById('page-start').value = readingData.lastPage + 1;
        document.getElementById('page-end').value = '';
    }

    async function saveProgress() {
        const start = parseInt(document.getElementById('page-start').value);
        const end = parseInt(document.getElementById('page-end').value);

        if (isNaN(start) || isNaN(end) || start > end) {
            alert("Пожалуйста, введите корректный диапазон страниц.");
            return;
        }

        document.getElementById('loading-overlay').style.display = 'block';
        document.getElementById('submit-btn').disabled = true;

        const today = new Date().toLocaleDateString();
        const payload = {
            action: 'write',
            start: start,
            end: end,
            date: today
        };

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'cors',
                body: JSON.stringify(payload)
            });
            // После успешной записи перечитываем таблицу заново
            await loadDataFromSheets();
        } catch (error) {
            console.error("Ошибка сохранения данных:", error);
            alert("Не удалось сохранить данные в таблицу.");
        } finally {
            document.getElementById('loading-overlay').style.display = 'none';
            document.getElementById('submit-btn').disabled = false;
        }
    }

    // Запуск синхронизации при открытии вкладки
    loadDataFromSheets();
</script>

</body>
</html>
